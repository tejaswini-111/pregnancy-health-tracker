
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Pregnancy Care</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #fce4ec; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; }
        h2 { color: #ad1457; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #ad1457; font-weight: bold; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; border: 1px solid #f8bbd0; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #ff69b4; }
        .btn { width: 100%; padding: 12px; background: #ff69b4; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: #ad1457; }
        .footer-link { text-align: center; margin-top: 15px; font-size: 0.85rem; color: #666; }
        .footer-link a { color: #ff69b4; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Create Account</h2>
    <form action="/register" method="POST">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required placeholder="Create a password">
        </div>
        
        <button type="submit" class="btn">Register</button>
    </form>
    
    <div class="footer-link">
       Already have an account? <a href="{{ url_for('login_page') }}">Login here</a> 

    </div>
</div>

</body>
</html>
