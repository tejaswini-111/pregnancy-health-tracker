{% extends "base.html" %}
{% block content %}
<div class="container">
    <div class="card" style="margin-bottom: 20px; border-top: 5px solid var(--pink-main);">
        <h3>📅 Update Pregnancy Timeline</h3>
        <form action="/update_lmp" method="POST" style="display: flex; gap: 10px;">
            <input type="date" name="lmp_date" required style="flex-grow: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
            <button type="submit" class="btn" style="background: var(--pink-main);">Update LMP</button>
        </form>
    </div>

    <div class="card">
        <h2 style="color: var(--pink-dark);">Welcome, {{ user_name }}!</h2>
        <div style="background: #eee; border-radius: 20px; height: 25px; margin: 20px 0; overflow: hidden;">
            <div style="width: {{ progress }}%; background: var(--pink-main); height: 100%; text-align: center; color: white; font-size: 14px; line-height: 25px;">
                {{ progress }}%
            </div>
        </div>
        
        <div style="display: flex; justify-content: space-between; text-align: center;">
            <div><p><strong>Week</strong></p><h3>{{ weeks }}</h3></div>
            <div><p><strong>Trimester</strong></p><h3>{{ trimester }}</h3></div>
            <div><p><strong>Due Date</strong></p><h3>{{ due_date }}</h3></div>
        </div>

        <div style="margin-top: 20px; text-align: center;">
            <a href="/details/{{ weeks }}" class="btn" style="background: var(--pink-dark); width: 80%;">🔍 View Week {{ weeks }} Details & Vaccines</a>
        </div>
    </div>
</div>
{% endblock %}
