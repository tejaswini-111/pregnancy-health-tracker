{% extends "base.html" %}
{% block content %}
<div class="container" style="width: 100%; max-width: 900px; margin: 0 auto; padding: 20px;">
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="color: var(--pink-dark);">Welcome, {{ user_name }}!</h2>
    </div>
    <div class="card" style="width: 100%; margin-bottom: 20px; border-top: 5px solid var(--pink-main); display: block; clear: both;">
        <h3 style="color: var(--pink-dark);">?? Update Pregnancy Timeline</h3>
        <form action="/update_lmp" method="POST" style="display: flex; gap: 10px;">
            <input type="date" name="lmp_date" required style="flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            <button type="submit" class="btn" style="background: var(--pink-main); color: white; padding: 10px 20px; border-radius: 8px;">Update</button>
        </form>
    </div>
    <div class="card" style="width: 100%; display: block; clear: both; text-align: center;">
        <div style="background: #f0f0f0; border-radius: 20px; height: 30px; margin-bottom: 25px; overflow: hidden;">
            <div style="width: {{ progress }}%; background: var(--pink-main); height: 100%; color: white; line-height: 30px;">{{ progress }}% Complete</div>
        </div>
        <div style="display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; margin-bottom: 20px;">
            <div><p>Week</p><h3>{{ weeks }}</h3></div>
            <div><p>Trimester</p><h3>{{ trimester }}</h3></div>
            <div><p>Due Date</p><h3>{{ due_date }}</h3></div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <a href="/details/{{ weeks }}" class="btn" style="background: var(--pink-dark); color: white; padding: 15px; text-decoration: none; border-radius: 10px;">?? View Details</a>
            <a href="/predict_page" class="btn" style="background: var(--pink-main); color: white; padding: 15px; text-decoration: none; border-radius: 10px;">?? Run Health Risk Analysis</a>
            <a href="/faq" class="btn" style="background: #fff; color: var(--pink-dark); border: 2px solid var(--pink-dark); padding: 13px; text-decoration: none; border-radius: 10px;">?? Medical FAQ</a>
            <a href="/logout" style="color: #999; text-decoration: none; margin-top: 10px;">Logout</a>
        </div>
    </div>
</div>
{% endblock %}
