{% extends "base.html" %}
{% block content %}
<div class="container" style="width: 100%; max-width: 750px; margin: 0 auto; padding: 40px 20px;">

    <div style="background: #fff; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); padding: 45px; border-top: 12px solid var(--pink-main);">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="color: var(--pink-dark); margin: 0; font-size: 2.4rem;">Welcome, {{ user_name }}!</h2>
        </div>

        <div style="display: flex; justify-content: center; gap: 30px; margin-bottom: 40px; padding: 15px; background: #fff5f7; border-radius: 20px;">
            <a href="/dashboard" style="text-decoration: none; color: var(--pink-dark); font-weight: bold; font-size: 1.1rem;">🏠 Home</a>
            <a href="/predict_page" style="text-decoration: none; color: var(--pink-dark); font-weight: bold; font-size: 1.1rem;">❤️ Tracker</a>
            <a href="/faq_page" style="text-decoration: none; color: var(--pink-dark); font-weight: bold; font-size: 1.1rem;">👩‍⚕️ FAQ</a>
        </div>

        <div style="text-align: center; margin-bottom: 40px;">
            <div style="background: #f0f0f0; border-radius: 25px; height: 20px; overflow: hidden; margin-bottom: 25px;">
                <div style="width: {{ progress }}%; background: linear-gradient(90deg, var(--pink-light), var(--pink-main)); height: 100%;"></div>
            </div>
            <div style="display: flex; justify-content: space-around; align-items: center;">
                <div><span style="display:block; color:#aaa; font-size:0.9rem;">WEEK</span><b style="font-size:2.2rem; color: var(--pink-dark);">{{ weeks }}</b></div>
                <div style="border-left: 2px solid #eee; border-right: 2px solid #eee; padding: 0 30px;"><span style="display:block; color:#aaa; font-size:0.9rem;">TRIMESTER</span><b style="font-size:1.8rem; color: var(--pink-dark);">{{ trimester }}</b></div>
                <div><span style="display:block; color:#aaa; font-size:0.9rem;">DUE DATE</span><b style="font-size:1.2rem; color: var(--pink-dark);">{{ due_date }}</b></div>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 20px;">
            <a href="/predict_page" style="background: var(--pink-main); color: white; text-align: center; padding: 22px; border-radius: 18px; text-decoration: none; font-weight: bold; font-size: 1.3rem;">❤️ Run Health Risk Analysis</a>
            <a href="/details/{{ weeks }}" style="background: var(--pink-dark); color: white; text-align: center; padding: 18px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 1.1rem;">🔍 View Details</a>
            <a href="/logout" style="text-align: center; color: #cc0000; text-decoration: none; font-size: 1rem; margin-top: 20px; font-weight: bold; opacity: 0.8;">Logout</a>
        </div>
    </div>
</div>
{% endblock %}
