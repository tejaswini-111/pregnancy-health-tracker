{% extends "base.html" %}
{% block content %}
<div style="padding: 15px; display: flex; flex-direction: column; align-items: center;">

    <div style="background: white; width: 100%; max-width: 800px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); overflow: hidden; margin-top: 20px;">
        
        <div style="height: 10px; background: linear-gradient(90deg, var(--pink-main), var(--pink-dark));"></div>

        <div style="padding: 30px;">
            <div style="text-align: center; margin-bottom: 25px;">
                <h1 style="color: var(--pink-dark); margin: 0; font-size: clamp(1.8rem, 5vw, 2.8rem);">Welcome, {{ user_name }}!</h1>
                <p style="color: #888; margin-top: 8px;">Your Maternal Health Overview</p>
            </div>

            <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap;">
                <a href="/dashboard" style="text-decoration: none; padding: 10px 18px; background: #fff5f7; color: var(--pink-dark); border-radius: 50px; font-weight: bold; font-size: 0.9rem;">🏠 Home</a>
                <a href="/predict_page" style="text-decoration: none; padding: 10px 18px; background: #fff5f7; color: var(--pink-dark); border-radius: 50px; font-weight: bold; font-size: 0.9rem;">❤️ Tracker</a>
                <a href="/faq_page" style="text-decoration: none; padding: 10px 18px; background: #fff5f7; color: var(--pink-dark); border-radius: 50px; font-weight: bold; font-size: 0.9rem;">👩‍⚕️ FAQ</a>
            </div>

            <div style="background: #fafafa; border-radius: 20px; padding: 25px; margin-bottom: 30px; border: 1px solid #f0f0f0;">
                <div style="background: #e0e0e0; border-radius: 10px; height: 12px; margin-bottom: 25px; overflow: hidden;">
                    <div style="width: {{ progress }}%; background: var(--pink-main); height: 100%; transition: width 1s ease-in-out;"></div>
                </div>
                
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 20px; text-align: center;">
                    <div><span style="color:#aaa; font-size:0.8rem; text-transform:uppercase;">Week</span><br><b style="font-size:2rem; color: var(--pink-dark);">{{ weeks }}</b></div>
                    <div style="border-left: 1px solid #eee; border-right: 1px solid #eee;"><span style="color:#aaa; font-size:0.8rem; text-transform:uppercase;">Trimester</span><br><b style="font-size:1.5rem; color: var(--pink-dark);">{{ trimester }}</b></div>
                    <div><span style="color:#aaa; font-size:0.8rem; text-transform:uppercase;">Due Date</span><br><b style="font-size:1rem; color: var(--pink-dark);">{{ due_date }}</b></div>
                </div>
            </div>

            <form action="/update_lmp" method="POST" style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px;">
                <input type="date" name="lmp_date" required style="flex: 1; min-width: 200px; padding: 15px; border-radius: 12px; border: 1px solid #ddd; font-family: inherit;">
                <button type="submit" style="background: var(--pink-main); color: white; border: none; padding: 15px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; flex: 1; min-width: 120px;">Update Data</button>
            </form>

            <div style="display: flex; flex-direction: column; gap: 15px;">
                <a href="/predict_page" class="btn-hover" style="background: var(--pink-main); color: white; text-align: center; padding: 20px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 1.2rem; transition: 0.3s;">🚀 Run AI Risk Analysis</a>
                <a href="/details/{{ weeks }}" style="color: var(--pink-dark); text-align: center; font-weight: bold; text-decoration: none; font-size: 1rem; border: 2px solid var(--pink-dark); padding: 15px; border-radius: 15px;">🔍 Explore Week {{ weeks }} Details</a>
                <a href="/logout" style="text-align: center; color: #999; text-decoration: none; margin-top: 15px; font-size: 0.9rem;">Logout Account</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
