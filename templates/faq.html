{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 style="color:var(--pink-dark);">🩺 Medical Search & FAQ</h2>
    
    <div style="margin-bottom: 30px; padding: 15px; background: var(--pink-light); border-radius: 12px;">
        <p style="margin-top:0;"><strong>Search anything on Google:</strong></p>
        <form action="https://www.google.com/search" method="GET" target="_blank" style="display: flex; gap: 10px;">
            <input type="text" name="q" placeholder="Type your medical question..." 
                   style="flex-grow: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
            <button type="submit" class="btn" style="background: var(--pink-main);">Search</button>
        </form>
    </div>

    <p style="color:#666;">Or select a quick topic:</p>
    <div style="display: flex; flex-direction: column; gap: 10px;">
        {% for q in questions %}
            <a href="https://www.google.com/search?q={{ q|urlencode }}" target="_blank" 
               style="background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 8px; text-decoration: none; color: #333; border-left: 4px solid var(--pink-main);">
                {{ q }} ↗
            </a>
        {% endfor %}
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <a href="/dashboard" style="color: var(--pink-dark); text-decoration: none;">← Back to Dashboard</a>
    </div>
</div>
{% endblock %}
