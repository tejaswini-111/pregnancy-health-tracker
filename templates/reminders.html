{% extends "base.html" %}
{% block content %}
<div style="padding: 20px; min-height: 100vh; background: linear-gradient(135deg, #fff5f7 0%, #fdeff2 100%); display: flex; flex-direction: column; align-items: center;">
    
    <div style="width: 100%; max-width: 600px; animation: fadeIn 0.8s ease-out;">
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="color: #ad1457; margin: 0; font-size: 2.5rem; font-weight: 900; letter-spacing: -1px;">Daily Reminders</h1>
            <p style="color: #a0a0a0; font-size: 1.1rem;">Your personalized medication schedule.</p>
        </div>

        <div style="position: relative; padding-left: 20px; border-left: 3px dashed #ff69b4; margin-bottom: 40px;">
            {% for med in prescriptions %}
            <div style="background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(173, 20, 87, 0.05); position: relative; border: 1px solid #fce4ec;">
                
                <div style="position: absolute; left: -31px; top: 30px; width: 18px; height: 18px; background: #ad1457; border: 4px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(173, 20, 87, 0.3);"></div>

                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <span style="color: #ad1457; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">{{ med.display_time }}</span>
                        <h2 style="margin: 8px 0; color: #333; font-size: 1.4rem; font-weight: 800;">{{ med.name }}</h2>
                        <div style="display: flex; align-items: center; gap: 8px; color: #666; font-size: 0.95rem;">
                            <span style="background: #fff0f6; color: #ad1457; padding: 2px 8px; border-radius: 6px; font-weight: 700; font-size: 0.8rem;">{{ med.dosage }}</span>
                            <span>{{ med.instruction }}</span>
                        </div>
                    </div>
                </div>

                <button onclick="this.innerHTML='✅ Done for Today'; this.style.background='#52c41a'; this.style.color='white'; this.disabled=true;" 
                        class="btn-hover" 
                        style="margin-top: 20px; width: 100%; padding: 12px; border-radius: 12px; border: none; background: #fdf2f8; color: #ad1457; font-weight: 700; cursor: pointer; transition: 0.3s;">
                    Mark as Taken
                </button>
            </div>
            {% endfor %}
        </div>

        <div style="text-align: center; padding: 20px 0 40px 0; border-top: 1px solid rgba(173, 20, 87, 0.1);">
            <a href="/dashboard" class="btn-hover" style="display: inline-block; text-decoration: none; color: #ad1457; font-weight: 700; font-size: 1rem; padding: 12px 30px; border-radius: 50px; border: 2px solid #fce4ec; background: white;">
                🏠 Return to Dashboard
            </a>
        </div>
    </div>
</div>

<style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
{% endblock %}
