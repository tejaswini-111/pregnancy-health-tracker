{% extends "base.html" %}
{% block content %}
<div style="padding: 20px; min-height: 100vh; background: linear-gradient(135deg, #fff5f7 0%, #fdeff2 100%); display: flex; flex-direction: column; align-items: center;">
    
    <div style="width: 100%; max-width: 600px; animation: fadeIn 0.8s ease-out;">
        <div style="text-align: center; margin-bottom: 30px;">
            <a href="/dashboard" style="text-decoration: none; color: #ad1457; font-weight: bold;">← Back to Dashboard</a>
            <h1 style="color: #ad1457; margin: 15px 0 5px 0; font-size: 2.5rem; font-weight: 900;">Daily Reminders</h1>
            <p style="color: #a0a0a0;">Your personalized medication schedule.</p>
        </div>

        <div style="position: relative; padding-left: 20px; border-left: 3px dashed #ff69b4;">
            {% for med in prescriptions %}
            <div style="background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(173, 20, 87, 0.05); position: relative; border: 1px solid #fce4ec;">
                <div style="position: absolute; left: -31px; top: 25px; width: 18px; height: 18px; background: #ad1457; border: 4px solid white; border-radius: 50%;"></div>
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <span style="color: #ad1457; font-weight: 800; font-size: 0.8rem;">{{ med.display_time }}</span>
                        <h2 style="margin: 5px 0; color: #333; font-size: 1.3rem;">{{ med.name }} <small style="color: #888; font-size: 0.9rem;">({{ med.dosage }})</small></h2>
                        <p style="margin: 0; color: #666; font-size: 0.9rem;">{{ med.instruction }}</p>
                    </div>
                </div>
                <button onclick="this.innerHTML='✅ Taken'; this.style.background='#52c41a'; this.disabled=true;" style="margin-top: 15px; width: 100%; padding: 10px; border-radius: 10px; border: none; background: #fce4ec; color: #ad1457; font-weight: 700; cursor: pointer;">Mark as Taken</button>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
