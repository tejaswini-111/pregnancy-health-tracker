<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    
    <title>Maternal Care | Professional AI</title>

    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#ad1457">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/icon-192.png') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --pink-main: #ff69b4; 
            --pink-dark: #ad1457; 
            --bg-gradient: linear-gradient(135deg, #fff5f7 0%, #fdeff2 100%);
            --glass-white: rgba(255, 255, 255, 0.9);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient); 
            margin: 0; 
            padding: 0;
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        /* Responsive Container */
        .container { 
            width: 100%;
            max-width: 1100px; /* Better for wider desktops */
            margin: 0 auto;
            padding: 20px; /* Essential: prevents content touching screen edges on mobile */
        }

        /* Professional Utility Classes */
        .btn-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .btn-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.3);
            filter: brightness(1.05);
        }

        .btn-hover:active {
            transform: translateY(0);
        }

        /* Smooth page transitions */
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hide scrollbar but keep functionality for a "App" feel */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #fce4ec;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container fade-in">
        {% block content %}{% endblock %}
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                    .then(reg => console.log('PWA Ready'))
                    .catch(err => console.log('PWA failed', err));
            });
        }
    </script>

</body>
</html>
