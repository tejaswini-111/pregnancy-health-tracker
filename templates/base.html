<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pregnancy Care{% endblock %}</title>
    <style>
        :root { 
            --pink-main: #ff69b4; 
            --pink-dark: #ad1457; 
            --pink-light: #fce4ec; 
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #fdf2f8; 
            margin: 0; 
            padding: 0; 
            display: flex;
            justify-content: center;
        }
        .container { 
            width: 100%;
            max-width: 900px; /* Increased width for a bigger look */
            margin: 40px auto; 
            padding: 0 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
