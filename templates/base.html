<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Maternal Care | Professional</title>
    <style>
        :root { 
            --pink-main: #ff69b4; 
            --pink-dark: #ad1457; 
            --bg-gradient: linear-gradient(135deg, #fff5f7 0%, #fdeff2 100%);
        }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg-gradient); 
            margin: 0; 
            padding: 0;
            min-height: 100vh;
        }
        .container { 
            width: 100%;
            max-width: 1000px; /* Max width for Desktop */
            margin: auto;
            box-sizing: border-box;
        }
        /* Professional Button Hover Effects */
        .btn-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
